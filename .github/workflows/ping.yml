name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          if [ -n "$RENDER_URL" ]; then
            curl -s "$RENDER_URL/health" || true
          fi